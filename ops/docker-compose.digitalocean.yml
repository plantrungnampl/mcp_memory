services:
  api:
    build:
      context: ..
      dockerfile: apps/mcp-api/Dockerfile
    env_file:
      - ../.env.production
    environment:
      OBJECT_LOCAL_DIR: /var/lib/viberecall/objects
      EXPORT_LOCAL_DIR: /var/lib/viberecall/exports
    ports:
      - "127.0.0.1:8010:8010"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8010/healthz').getcode() == 200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - /srv/viberecall/data/objects:/var/lib/viberecall/objects
      - /srv/viberecall/data/exports:/var/lib/viberecall/exports

  worker:
    build:
      context: ..
      dockerfile: apps/mcp-api/Dockerfile
    command:
      - celery
      - -A
      - viberecall_mcp.workers.celery_app
      - worker
      - -l
      - info
      - -Q
      - memory
      - --pool=solo
      - --concurrency=1
    env_file:
      - ../.env.production
    environment:
      OBJECT_LOCAL_DIR: /var/lib/viberecall/objects
      EXPORT_LOCAL_DIR: /var/lib/viberecall/exports
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    volumes:
      - /srv/viberecall/data/objects:/var/lib/viberecall/objects
      - /srv/viberecall/data/exports:/var/lib/viberecall/exports

  falkordb:
    image: falkordb/falkordb:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "PING"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - /srv/viberecall/data/falkordb:/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - /srv/viberecall/data/redis:/data
